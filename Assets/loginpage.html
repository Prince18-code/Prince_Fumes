<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<style>

/* ===== PAGE CENTER ===== */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f3f6;
    font-family: Arial, Helvetica, sans-serif;
}

/* ===== OUTER CARD ===== */
.outer{
    width:650px;
    height:450px;
    background:#d7d7d4;
    border-radius:12px;
    box-shadow:0 0 30px rgba(0,0,0,0.2);
    display:flex;
}

/* ===== RIGHT INNER CARD ===== */
.inner{
    width:325px;
    height:100%;
    background:white;
    margin-left:auto;
    padding:40px 35px;
    box-sizing:border-box;
}

/* ===== LOGO ===== */
.inner img{
    display:block;
    margin:0 auto 12px auto;
    height:32px;
}

#par{
    text-align:center;
    margin-bottom:25px;
}

/* ===== FORM ===== */
.form label{
    font-weight:bold;
    font-size:14px;
    display:block;
    margin-top:18px;
}

.form input{
    width:100%;
    border:none;
    border-bottom:1px solid #999;
    padding:8px 2px;
    font-size:14px;
    outline:none;
}

/* ===== BUTTON ===== */
#sign-in{
    width:100%;
    margin-top:28px;
    height:38px;
    border:none;
    border-radius:6px;
    background:#d7d7d4;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

#sign-in:hover{
    background:#c8c8c5;
}

/* ===== LINK ===== */
.signup-link{
    margin-top:18px;
    text-align:center;
    font-size:14px;
}

.signup-link a{
    text-decoration:none;
    font-weight:bold;
    color:#000;
}

.signup-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="outer">

<div class="inner">
    <img src="logo.png" alt="logo">
    <p id="par">Welcome back to Prince Fumes</p>

<div class="form">
    <form action="/login" method="POST">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter Username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button id="sign-in" type="submit">Sign In</button>

    </form>
</div>

<div class="signup-link">
    Don't have an account?
    <a href="/signup.html">Create account</a>
</div>

</div>

</div>

</body>
</html>
